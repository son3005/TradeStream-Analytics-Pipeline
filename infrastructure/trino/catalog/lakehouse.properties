connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.catalog-name=lakehouse
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://timescaledb:5432/tradestream
iceberg.jdbc-catalog.connection-user=postgres
iceberg.jdbc-catalog.connection-password=postgres
iceberg.jdbc-catalog.default-warehouse-dir=s3://lakehouse/warehouse

# S3 / MinIO Configuration
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=admin
s3.aws-secret-key=minioadminpassword
s3.path-style-access=true
