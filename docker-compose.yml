# ==========================================
# TRADE STREAM ANALYTICS PIPELINE
# ==========================================
# Hướng dẫn chạy (chỉ bật những profile cần thiết để tiết kiệm RAM):
# 1. Bật Kafka:         docker compose --profile core up -d
# 2. Thêm Spark:         docker compose --profile core --profile processing up -d
# 3. Tắt tất cả:       docker compose --profile core --profile processing down
# ==========================================

services:
  # -----------------------------------
  # PROFILE: CORE (KAFKA STACK)
  # -----------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    profiles: [ "core" ]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo ruok | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradestream-net
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles: [ "core" ]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - tradestream-net
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles: [ "core" ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tradestream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure

  # -----------------------------------
  # PROFILE: PROCESSING (SPARK STACK)
  # -----------------------------------
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    profiles: [ "processing" ]
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master" ]
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8181
    ports:
      - "8181:8181" # Spark Master Web UI
      - "7077:7077" # Spark Master port cho Worker kết nối
    volumes:
      # Mount thư mục src vào Spark container (nơi có Java + Spark đầy đủ)
      - ./src:/opt/airflow/src
      # Mount JARs đã download sẵn, không cần tải lại mỗi lần chạy
      - ./infrastructure/spark/jars:/opt/spark/user-jars
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    profiles: [ "processing" ]
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8182
    ports:
      - "8182:8182" # Spark Worker Web UI
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    profiles: [ "storage" ]
    environment:
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tradestream-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [ "dashboard" ]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    networks:
      - tradestream-net
    depends_on:
      - timescaledb
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards

  # -----------------------------------
  # PROFILE: LAKEHOUSE (MINIO STORAGE)
  # -----------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    profiles: [ "lakehouse", "storage" ]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  minio-create-buckets:
    image: minio/mc:latest
    container_name: minio-create-buckets
    profiles: [ "lakehouse", "storage" ]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/${MINIO_LAKEHOUSE_BUCKET};
      mc anonymous set download myminio/${MINIO_LAKEHOUSE_BUCKET};
      exit 0;
      "
    networks:
      - tradestream-net


  # -----------------------------------
  # PROFILE: ORCHESTRATION (AIRFLOW)
  # -----------------------------------
  # Airflow = "Quản đốc nhà máy"
  # Nó KHÔNG xử lý dữ liệu, nó chỉ LÊN LỊCH và GIÁM SÁT các script khác chạy.

  # Container 1/4: Database riêng cho Airflow
  # Airflow cần 1 database để ghi nhớ: "DAG nào đã chạy? Task nào lỗi? Lúc mấy giờ?"
  # Chúng ta TÁCH RIÊNG database này khỏi TimescaleDB (chứa dữ liệu crypto)
  # → Nếu xóa DB crypto để test, lịch sử Airflow vẫn còn nguyên
  airflow-metadata:
    image: postgres:14
    container_name: airflow-metadata
    profiles: [ "orchestration" ]
    environment:
      # Tên database, user, password — CHỈ dùng cho Airflow, không liên quan tới crypto data
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      # Lưu dữ liệu metadata vào volume để không mất khi restart container
      - airflow_metadata:/var/lib/postgresql/data
    networks:
      - tradestream-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Container 2/4: Khởi tạo Airflow (chạy 1 LẦN DUY NHẤT rồi tự tắt)
  # Giống như file init.sql của TimescaleDB — tạo bảng, tạo tài khoản admin
  # Sau khi hoàn thành, container này sẽ tự thoát (exit 0)
  airflow-init:
    image: apache/airflow:3.2.1
    container_name: airflow-init
    profiles: [ "orchestration" ]
    depends_on:
      airflow-metadata:
        condition: service_healthy
    environment:
      # Chuỗi kết nối tới database metadata (giống jdbc URL trong Java)
      # Format: postgresql+psycopg2://user:password@hostname:port/database
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}

      # Executor quyết định AI sẽ chạy task:
      # - LocalExecutor: Scheduler tự chạy luôn (đơn giản, không cần Worker riêng)
      # - CeleryExecutor: Scheduler giao việc cho Worker qua Redis (phức tạp hơn)
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

      # Tắt load DAG mẫu (Airflow đi kèm ~20 DAG demo, rất rối cho người mới)
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Lệnh chạy: tạo bảng trong DB → tạo tài khoản admin
    # "airflow db migrate" = tạo/cập nhật schema database
    # "airflow users create" = tạo tài khoản đăng nhập web UI
    command: >
      bash -c "airflow db migrate"
    networks:
      - tradestream-net

  # Container 3/4: Giao diện Web (MÀN HÌNH GIÁM SÁT)
  # Bạn mở trình duyệt → localhost:8085 → nhìn thấy DAG, task, log
  # Container này KHÔNG chạy task, nó chỉ ĐỌC từ metadata DB và HIỂN THỊ
  airflow-webserver:
    image: apache/airflow:3.2.1
    container_name: airflow-webserver
    profiles: [ "orchestration" ]
    depends_on:
      airflow-metadata:
        condition: service_healthy
    ports:
      # Ánh xạ port 8085 trên máy bạn → port 8080 bên trong container
      # Tại sao 8085? Vì 8080 đã bị Kafka-UI chiếm rồi
      - "8085:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/

      # Cài đặt thêm thư viện Python cho Airflow khi khởi động
      _PIP_ADDITIONAL_REQUIREMENTS: "aiohttp confluent-kafka pyspark==3.5.3"

      # Secret keys (giá trị thật nằm trong .env, KHÔNG hardcode ở đây)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      # Airflow 3.x dùng "Simple Auth Manager" — khai báo user bằng biến này
      AIRFLOW__SIMPLE_AUTH_MANAGER__USERS: ${AIRFLOW_ADMIN_USERS}

      # Trỏ tới file password cố định thay vì để Airflow tự sinh ngẫu nhiên
      # File này nằm tại: infrastructure/airflow/passwords.json
      # Muốn đổi pass → sửa file → restart container
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/passwords.json
    volumes:
      - ./dags:/opt/airflow/dags
      # Mount thư mục src để Airflow gọi được các script Python & Spark
      - ./src:/opt/airflow/src
      # Mount file password vào container
      - ./infrastructure/airflow/passwords.json:/opt/airflow/passwords.json
    # Airflow 3.x đổi "webserver" → "api-server" (giao diện web + API gộp chung)
    command: airflow api-server
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Container 4/4: Bộ não (SCHEDULER)
  # Liên tục quét: "Bây giờ mấy giờ? Có DAG nào tới lịch chạy chưa?"
  # Với LocalExecutor: Scheduler VỪA lên lịch VỪA tự chạy task luôn
  # (không cần container Worker riêng)
  airflow-scheduler:
    image: apache/airflow:3.2.1
    container_name: airflow-scheduler
    profiles: [ "orchestration" ]
    depends_on:
      airflow-metadata:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

      # Scheduler cần biết API Server ở đâu để giao việc cho Worker
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/

      _PIP_ADDITIONAL_REQUIREMENTS: "aiohttp confluent-kafka pyspark==3.5.3"

      # Biến môi trường cho DAGs (đọc từ .env)
      YAHOO_FINANCE_URL: ${YAHOO_FINANCE_URL}
      TIMESCALE_CONN: ${TIMESCALE_CONN}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      # Mount config/ để DAGs đọc file symbols.json
      - ./config:/opt/airflow/config
      # Mount Docker socket để Airflow Scheduler có thể gọi 'docker exec' vào Spark container
      - /var/run/docker.sock:/var/run/docker.sock
    command: airflow scheduler
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Container 5/5: Dag Processor (Airflow 3 mới có)
  # Airflow 2: Scheduler tự đọc file DAG
  # Airflow 3: Tách riêng → Dag Processor chuyên đọc file Python trong dags/
  # Nếu không có container này → trang Dags sẽ trống (No Dags found)
  airflow-dag-processor:
    image: apache/airflow:3.2.1
    container_name: airflow-dag-processor
    profiles: [ "orchestration" ]
    depends_on:
      airflow-metadata:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
      _PIP_ADDITIONAL_REQUIREMENTS: "aiohttp confluent-kafka pyspark==3.5.3"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      # DAG processor cũng cần config/ vì nó parse file Python (đọc symbols.json)
      - ./config:/opt/airflow/config
    command: airflow dag-processor
    networks:
      - tradestream-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  tradestream-net:
    name: tradestream-net
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  timescaledb_data:
  grafana_data: # Volume mới cho database nội bộ của Airflow
  airflow_metadata:
  minio_data:

